name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Minify assets
        run: |
          npm install -g esbuild
          mkdir dist
          cp index.html robots.txt sitemap.xml CNAME og-image.png dist/
          esbuild draw.js --bundle=false --minify --outfile=dist/draw.js
          esbuild draw.css --bundle=false --minify --outfile=dist/draw.css
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
      - id: deployment
        uses: actions/deploy-pages@v4
